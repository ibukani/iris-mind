  fast_model: qwen3.5:2b
  base_url: http://localhost:11434
  max_tokens: 1024
  max_tokens_fast: 512
  temperature: 0.7
  num_draft: 0
  num_ctx: 8192
  num_gpu: 99
  context_window: 4000

personality:
  name: Iris
  thinking_mode_default: false
