model:
  models:
    - name: qwen3.5:2b
      role: base
      max_tokens: 512
    - name: qwen3.5:9b
      role: smart
      max_tokens: 1024
  escalation:
    enabled: true
    max_retries: 1
    swap_on_escalate: true
    keep_alive_duration: "5m"
  base_url: http://localhost:11434
  temperature: 0.7
  num_gpu: 99
  num_ctx: 8192
  context_window: 4000
  compaction_threshold: 0.85

personality:
  name: Iris
  thinking_mode_default: false
  prompt_file: memory/config/personality_default.md

memory:
  episodic_path: memory/data/episodes.jsonl
  semantic_path: memory/data/semantic.jsonl
  vector_db_path: memory/data/chroma_db
  agents_md_path: memory/data/iris_profile.md
  agents_md_max_bytes: 2048
