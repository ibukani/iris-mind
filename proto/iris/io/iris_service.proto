syntax = "proto3";

package iris.io;

enum Permission {
  SEND_CHAT = 0;
  RECEIVE_CHAT = 1;
  SEND_COMMAND = 2;
  RECEIVE_COMMAND = 3;
  RECEIVE_LOG = 4;
  INTERRUPT = 5;
  EXECUTE_ACTION = 6;
}

message Message {
  string id = 1;
  string correlation_id = 2;
  string session_id = 3;
  string source_role = 4;
  string target_role = 5;
  string direction = 6;
  string msg_type = 7;
  string content = 8;
  string content_type = 9;
  string state = 10;
  map<string, string> metadata = 11;
}

message CommandInput {
  string msg_type = 1;
  string id = 2;
  string session_id = 3;
  string source_role = 4;
  string content = 5;
}

message CommandOutput {
  string id = 1;
  string correlation_id = 2;
  string session_id = 3;
  string msg_type = 4;
  string content = 5;
  string state = 6;
}

message ClientFrame {
  oneof frame {
    Message message = 1;
    CommandInput command = 2;
  }
}

message ServerFrame {
  oneof frame {
    Message message = 1;
    CommandOutput command = 2;
  }
}

service IrisService {
  rpc BidirectionalStream(stream ClientFrame) returns (stream ServerFrame);
}
