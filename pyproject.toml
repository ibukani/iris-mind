[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "iris"
version = "0.1.0"
description = "Autonomous AI assistant that learns and evolves"
requires-python = ">=3.13"
dependencies = [
    "ollama>=0.6",
    "pydantic>=2",
    "pyyaml>=6",
    "rich>=13",
    "prompt-toolkit>=3",
    "chromadb>=1.4",
]

[tool.setuptools.packages.find]
include = ["core*", "memory*", "capabilities*"]
