[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-mind"
version = "0.3.0"
description = "Autonomous AI assistant that learns and evolves"
requires-python = ">=3.13"
dependencies = [
    "ollama>=0.6",
    "httpx>=0.28",
    "python-dotenv>=1.1",
    "pydantic>=2",
    "pyyaml>=6",
    "rich>=13",
    "prompt-toolkit>=3",
    "chromadb>=1.4",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15",
    "mypy>=2.1",
    "pytest>=9",
    "hypothesis>=6",
    "pre-commit>=4",
    "types-PyYAML",
]

[tool.setuptools.packages.find]
include = ["iris*"]

[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "ARG", "PTH", "D", "PERF", "PIE", "RUF", "S"]
# docstring ルール: 重要なpublic関数のみ（Pythonではすべてのクラス/関数に必須ではない）
# D100: モジュールトップの docstring → 不要
# D101: public class → 型ヒント + クラス名で十分
# D102: public method → trivialなメソッドが多すぎるため除外
# D103: public function → パッケージ内の小さな関数も多いため除外
# D104: パッケージ __init__ の docstring → 不要
# D105: __dunder_method__ → __init__ は別、其他は不要
# D107: __init__ の docstring → 型ヒントで十分
# D415: First line should end with period → 日本語docstringが多いため除外
ignore = ["D100", "D101", "D102", "D103", "D104", "D105", "D107", "D415", "S101"]

[tool.ruff.lint.isort]
force-single-line = false
force-sort-within-sections = true
known-first-party = ["iris", "tests"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ARG002", "S101", "D"]
"iris/tools/builtins/**" = ["D100", "D101"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
quote-style = "double"
docstring-code-format = true

[tool.mypy]
python_version = "3.13"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
ignore_missing_imports = false
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_no_return = true
warn_return_any = true
implicit_reexport = false
no_implicit_reexport = true

[[tool.mypy.overrides]]
module = [
  "iris.llm.llm_bridge",
  "iris.llm.ollama_provider",
  "iris.memory.vector_store",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = "chromadb.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["ollama", "httpx", "prompt_toolkit", "rich"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disable_error_code = [
  "arg-type",
  "list-item",
  "comparison-overlap",
  "attr-defined",
  "misc",
  "call-overload",
  "index",
  "untyped-def",
  "any-unimported",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-v --strict-markers --tb=short"
markers = [
  "unit: ユニットテスト",
  "integration: 統合テスト",
  "slow: 低速テスト",
]
