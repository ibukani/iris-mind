[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "iris"
version = "0.2.0"
description = "Autonomous AI assistant that learns and evolves"
requires-python = ">=3.13"
dependencies = [
    "ollama>=0.6",
    "httpx>=0.28",
    "python-dotenv>=1.1",
    "pydantic>=2",
    "pyyaml>=6",
    "rich>=13",
    "prompt-toolkit>=3",
    "chromadb>=1.4",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15",
    "mypy>=2.1",
    "pytest>=9",
    "pre-commit>=4",
    "types-PyYAML",
]

[tool.setuptools.packages.find]
include = ["iris*", "core*", "memory*", "capabilities*"]

[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "ARG", "PTH207"]

[tool.ruff.lint.per-file-ignores]
"core/cli.py" = ["B023"]
"core/conversation.py" = ["ARG002"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.13"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
ignore_missing_imports = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = [
  "iris.llm.llm_bridge",
  "iris.llm.ollama_provider",
  "iris.memory.vector_store",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
